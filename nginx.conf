# nginx.conf — Frontend container
# Serves the React SPA and proxies /api + /static to the backend container.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/javascript application/javascript
        application/json image/svg+xml;

    # ── Cache static assets aggressively ────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Proxy /api/* to the backend service ─────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        # Allow large file uploads (MRI images up to 16 MB)
        client_max_body_size 16m;
    }

    # ── Proxy /static/* to the backend (uploaded images / heatmaps) ─────────
    location /static/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_cache_valid  200 1d;
        expires 1d;
        add_header Cache-Control "public";
    }

    # ── React Router — serve index.html for all unknown routes ───────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
